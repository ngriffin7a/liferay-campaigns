#
# OAuth
#

liferay.oauth.application.external.reference.codes=\
    liferay-campaigns-oauth-application-user-agent

liferay.oauth.urls.excludes=/ready,/tracking-pixel

#
# Spring Boot
#

server.port=58081

#
# CORS
#
# Comma-separated list of allowed origin patterns for fragment cross-origin
# requests. Defaults to "*" for local dev; scope to e.g. https://*.lfr.cloud
# for PaaS deployments.
#

cors.allowed.origin.patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:*}

#
# Email Campaign
#
email.friendly.url.base.url=${EMAIL_FRIENDLY_URL_BASE_URL:https://webserver-lctfootrial-prd.lfr.cloud}
liferay.headless.api.base.url=${LIFERAY_HEADLESS_API_BASE_URL:https://webserver-lctfootrial-prd.lfr.cloud/o}
tracking.pixel.base.url=${TRACKING_PIXEL_BASE_URL:https://campaignsmicroservice-lctfootrial-prd.lfr.cloud/}

# Shared secret used to encrypt the open-tracking pixel URL parameters
# (AES-GCM). The pixel endpoint is public/unauthenticated; setting a secret lets
# it carry the recipient email address and campaign/content metadata as a single
# encrypted token instead of cleartext query parameters. That gives every open
# event two guarantees at once: the values stay private (only this service can
# read them) and every accepted event is provably genuine (forged or tampered
# tokens fail to decrypt and are dropped). Must be identical across all replicas
# of this microservice. When left blank the endpoint fails closed and DROPS
# events (see tracking.pixel.allow-unsigned), so set this in any real deployment.
#
# This is a machine credential, NOT a human-chosen password: because it is the
# key for publicly reachable pixel URLs, its strength comes from entropy. Use a
# high-entropy, cryptographically random value of at least 32 characters, e.g.
# `openssl rand -base64 32` -- that leaves an intercepted URL nothing to guess
# offline. The service logs a warning at startup if the configured secret is
# shorter than that.
tracking.pixel.secret=${TRACKING_PIXEL_SECRET:}

# When no secret is configured, accept cleartext, unauthenticated events (the
# email address then appears in the URL). Defaults to false (fail closed: events
# are dropped rather than trusted), which is the safe production behavior. Set
# true ONLY for local development.
tracking.pixel.allow-unsigned=${TRACKING_PIXEL_ALLOW_UNSIGNED:false}

# How long a pixel token remains valid, in days. Keeps a captured pixel URL from
# being replayed indefinitely while still allowing the long tail of legitimate
# email opens. 0 (or negative) disables the freshness check.
tracking.pixel.max-age-days=${TRACKING_PIXEL_MAX_AGE_DAYS:90}

#
# Display Page URLs are now resolved dynamically at runtime by
# DisplayPageUrlService, which queries Liferay's object-definition, site, and
# asset-library APIs (using the liferay.email / liferay.password credentials
# below for its startup load). No per-type URL patterns need to be configured.
#

#
# Spring Mail
#
# Note that the following must environment varibles must be set:
#
# SPRING_MAIL_HOST
# SPRING_MAIL_PORT
# SPRING_MAIL_USERNAME
# SPRING_MAIL_PASSWORD
#
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:noreply@example.com}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

#
# Analytics
#
# Analytics Cloud publisher endpoint
analytics.endpoint.url=${ANALYTICS_ENDPOINT_URL:https://osbasahpublisher-ac-uswest1.lfr.cloud/}
# Project ID — find by inspecting the OSB-Asah-Project-ID header on Analytics
# XHR requests in the browser's Network tab
analytics.project.id=${ANALYTICS_PROJECT_ID:REPLACE_WITH_PROJECT_ID}
# Data Source ID — find the "dataSourceId" attribute in the JSON payload of the
# same Analytics XHR request in the browser's Network tab
analytics.datasource.id=${ANALYTICS_DATASOURCE_ID:}
# Channel ID — find the "channelId" attribute in the JSON payload of the same
# Analytics XHR request in the browser's Network tab
analytics.channel.id=${ANALYTICS_CHANNEL_ID:}

#
# Campaign Scheduler (Basic Auth)
#
liferay.base.url=${LIFERAY_BASE_URL:https://webserver-lctfootrial-prd.lfr.cloud}
liferay.email=${LIFERAY_EMAIL:test@liferay.com}
liferay.password=${LIFERAY_PASSWORD:}

#
# Outbound HTTP client
#
# Connect/read timeouts (milliseconds) for the shared RestTemplate used for all
# outbound calls to Liferay and Analytics Cloud. Bounding these keeps a slow or
# hung upstream from pinning the scheduler thread or the tracking-pixel pool.
#
rest.client.connect.timeout.millis=${REST_CLIENT_CONNECT_TIMEOUT_MILLIS:5000}
rest.client.read.timeout.millis=${REST_CLIENT_READ_TIMEOUT_MILLIS:10000}

#
# Logging
#
logging.level.root=INFO
# Defaults to INFO so PII-bearing payloads (logged at DEBUG) stay out of normal
# logs. Set CAMPAIGNS_LOG_LEVEL=DEBUG in a controlled environment to enable
# verbose request/payload logging.
logging.level.com.liferay.campaigns=${CAMPAIGNS_LOG_LEVEL:INFO}
